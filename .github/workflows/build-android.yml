name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create Cordova Project Structure
        run: |
          # Create a fresh Cordova project
          cordova create temp-app hk.edu.hkmu.schoolinfo "School Info App"
          # Copy the www folder from your repository
          cp -r www/* temp-app/www/
          # Copy config.xml
          cp config.xml temp-app/
          # Move into the temp-app directory
          cd temp-app
          
      - name: Add Android Platform
        run: |
          cd temp-app
          cordova platform add android --no-fetch
      
      - name: Build APK
        run: |
          cd temp-app
          cordova build android
      
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: school-info-app
          path: temp-app/platforms/android/app/build/outputs/apk/debug/*.apk
