name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Check Cordova Requirements
        run: cordova info
      
      - name: Create Cordova Project
        run: |
          cordova create temp-app hk.edu.hkmu.schoolinfo "School Info App"
          cd temp-app
          cordova platform add android
      
      - name: Copy Project Files
        run: |
          cp -r www/* temp-app/www/ || true
          cp config.xml temp-app/ || true
      
      - name: Install Dependencies
        run: |
          cd temp-app
          npm install
      
      - name: Build APK
        run: |
          cd temp-app
          cordova build android --release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: school-info-app
          path: temp-app/platforms/android/app/build/outputs/apk/**/*.apk
