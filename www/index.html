<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hong Kong School Information</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>Hong Kong Schools</h1>
        <p>Find information about schools in Hong Kong</p>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Search by school name or district..." onkeyup="filterSchools()">
        <button id="langBtn" onclick="toggleLanguage()">🌐 中文</button>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats">
        Loading schools...
    </div>

    <!-- School List -->
    <div class="school-list" id="schoolList">
        <div class="loading">Loading school data...</div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Data from Hong Kong Education Bureau | Total schools: <span id="totalCount">0</span></p>
    </div>

    <script src="app.js"></script>
    <!-- Search Section -->
    <div class="search-section">
    <!-- Main Search Box -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search by school name...">
    </div>

    <!-- Additional Filter Text Boxes -->
    <div class="filter-row">
        <input type="text" id="districtFilter" placeholder="📍 Filter by district (e.g., Kowloon City)">
        <input type="text" id="typeFilter" placeholder="🏫 Filter by type (e.g., Secondary)">
    </div>

    <!-- Filter Buttons (keep existing) -->
    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All Schools</button>
        <button class="filter-btn" data-filter="Kindergarten">Kindergarten</button>
        <button class="filter-btn" data-filter="Primary">Primary</button>
        <button class="filter-btn" data-filter="Secondary">Secondary</button>
        <button class="filter-btn" data-filter="University">University</button>
    </div>
</div>
</body>
</html>
